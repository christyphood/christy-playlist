<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>其他自建歌单</title>
    <!-- Tailwind：用 jsDelivr，Cursor / Live Preview 比 cdn.tailwindcss.com 更稳定 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Figma 导出工具：仅 ?figma=1 时加载，避免拖慢或干扰日常预览 -->
    <script>
      if (/\bfigma=1\b/.test(location.search)) {
        var s = document.createElement('script');
        s.src = 'https://kg.qq.com/gtimg/music/common/upload/image/copy-to-figma.js';
        document.head.appendChild(s);
      }
    </script>
    <style>
      @font-face {
        font-family: 'joox';
        src: url('https://kg.qq.com/gtimg/music/common/upload/font/joox-regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'joox';
        src: url('https://kg.qq.com/gtimg/music/common/upload/font/joox-medium.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'joox';
        src: url('https://kg.qq.com/gtimg/music/common/upload/font/joox-bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
      }
      @font-face {
        font-family: 'joox-sans-brand';
        src: url('https://kg.qq.com/gtimg/music/common/upload/font/joox-sans-brand.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
      }
      html {
        height: 100%;
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      .app-viewport {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        min-height: 0;
        flex: 1;
      }
      #screen {
        flex-shrink: 0;
        transform-origin: center center;
        will-change: transform;
      }
      @media (max-width: 480px) {
        .expanded-close {
          width: 48px;
          height: 48px;
          font-size: 30px;
          line-height: 48px;
          top: max(65px, calc(env(safe-area-inset-top) + 52px));
          right: max(16px, env(safe-area-inset-right));
        }
        .expanded-podcast-btn {
          top: max(65px, calc(env(safe-area-inset-top) + 52px));
          right: max(72px, calc(env(safe-area-inset-right) + 56px));
        }
        .cover-stack-trigger {
          touch-action: manipulation;
        }
      }

      .hero-bg-clip {
        position: absolute;
        inset: 0;
        overflow: hidden;
        z-index: 1;
      }
      .fluid-bg {
        position: absolute;
        inset: -52.5px -40px -120px;
        background: #D57100;
      }
      .hero-area::after {
        content: '';
        position: absolute;
        left: 0; right: 0; bottom: -6px;
        height: 8px;
        background: #000000;
        box-shadow: 0 8px 0 0 #000000;
        z-index: 5;
        pointer-events: none;
      }
      .fluid-bg .blob {
        position: absolute;
        filter: blur(42px);
        will-change: transform;
      }
      /* 亮珊瑚 · 右上 */
      .fluid-bg .blob-1 {
        width: 220px; height: 170px;
        background: #FFC860;
        border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
        top: -40px; right: -50px;
        opacity: 0.95;
        animation: drift1 10s ease-in-out infinite alternate, morph1 14s ease-in-out infinite;
      }
      /* 深褐暗流 · 中部 */
      .fluid-bg .blob-2 {
        width: 240px; height: 100px;
        background: #4A0E00;
        border-radius: 45% 55% 40% 60% / 55% 45% 55% 45%;
        top: 120px; left: 20px;
        opacity: 1;
        animation: drift2 12s ease-in-out infinite alternate, morph2 16s ease-in-out infinite;
      }
      /* 奶油高光 · 左中 */
      .fluid-bg .blob-3 {
        width: 200px; height: 160px;
        background: #FFF4DC;
        border-radius: 55% 45% 50% 50% / 40% 60% 45% 55%;
        top: 60px; left: -200px;
        opacity: 0.3;
        animation: drift3 11s ease-in-out infinite alternate, morph3 13s ease-in-out infinite;
      }
      /* 艳橙 · 左下 */
      .fluid-bg .blob-4 {
        width: 210px; height: 150px;
        background: #FF4000;
        border-radius: 40% 60% 45% 55% / 55% 40% 60% 45%;
        bottom: -30px; left: -40px;
        opacity: 0.95;
        animation: drift4 13s ease-in-out infinite alternate, morph1 17s ease-in-out infinite;
      }
      /* 浅金高光 · 右下 */
      .fluid-bg .blob-5 {
        width: 190px; height: 140px;
        background: #FFFAE8;
        border-radius: 50% 50% 40% 60% / 45% 55% 50% 50%;
        bottom: 20px; right: -30px;
        opacity: 0.4;
        animation: drift5 9s ease-in-out infinite alternate, morph2 12s ease-in-out infinite;
      }
      /* 深酒红 · 右中 */
      .fluid-bg .blob-6 {
        width: 180px; height: 130px;
        background: #901008;
        border-radius: 45% 55% 60% 40% / 50% 45% 55% 50%;
        top: 80px; right: 40px;
        opacity: 0.92;
        animation: drift6 14s ease-in-out infinite alternate, morph3 15s ease-in-out infinite;
      }
      .fluid-bg .blob-7,
      .fluid-bg .blob-8,
      .fluid-bg .blob-9,
      .fluid-bg .blob-10 {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.45s ease;
      }
      .fluid-bg .blob-7 {
        width: 200px; height: 150px;
        background: #FFB347;
        border-radius: 50% 45% 55% 50% / 45% 55% 50% 50%;
        top: 200px; left: 50%;
        margin-left: -100px;
        animation: morph2 13s ease-in-out infinite;
      }
      .fluid-bg .blob-8 {
        width: 170px; height: 120px;
        background: #C44B00;
        border-radius: 55% 45% 50% 50% / 50% 50% 45% 55%;
        top: 320px; right: -20px;
        animation: morph1 11s ease-in-out infinite;
      }
      .fluid-bg .blob-9 {
        width: 190px; height: 140px;
        background: #FFE0A8;
        border-radius: 45% 55% 45% 55% / 55% 45% 55% 45%;
        top: 420px; left: -60px;
        opacity: 0;
        animation: morph3 12s ease-in-out infinite;
      }
      .fluid-bg .blob-10 {
        width: 160px; height: 110px;
        background: #6B1500;
        border-radius: 50% 50% 45% 55% / 55% 45% 50% 50%;
        top: 500px; right: 30px;
        animation: morph2 14s ease-in-out infinite;
      }
      .fluid-bg.is-rhythm-active .blob:not(.blob-dark) {
        animation: none !important;
      }
      .fluid-bg.is-rhythm-active .blob.is-rhythm-visible {
        animation: morph1 12s ease-in-out infinite !important;
      }
      .fluid-bg.is-rhythm-active .blob-2.is-rhythm-visible,
      .fluid-bg.is-rhythm-active .blob-5.is-rhythm-visible,
      .fluid-bg.is-rhythm-active .blob-8.is-rhythm-visible,
      .fluid-bg.is-rhythm-active .blob-10.is-rhythm-visible {
        animation: morph2 12s ease-in-out infinite !important;
      }
      .fluid-bg.is-rhythm-active .blob-3.is-rhythm-visible,
      .fluid-bg.is-rhythm-active .blob-6.is-rhythm-visible,
      .fluid-bg.is-rhythm-active .blob-9.is-rhythm-visible {
        animation: morph3 12s ease-in-out infinite !important;
      }

      @keyframes morph1 {
        0%, 100% { border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%; }
        25%      { border-radius: 40% 60% 45% 55% / 60% 40% 55% 45%; }
        50%      { border-radius: 55% 45% 60% 40% / 45% 55% 50% 50%; }
        75%      { border-radius: 45% 55% 40% 60% / 55% 45% 60% 40%; }
      }
      @keyframes morph2 {
        0%, 100% { border-radius: 45% 55% 40% 60% / 55% 45% 55% 45%; }
        25%      { border-radius: 55% 45% 55% 45% / 40% 60% 45% 55%; }
        50%      { border-radius: 40% 60% 50% 50% / 55% 45% 40% 60%; }
        75%      { border-radius: 60% 40% 45% 55% / 50% 50% 55% 45%; }
      }
      @keyframes morph3 {
        0%, 100% { border-radius: 55% 45% 50% 50% / 40% 60% 45% 55%; }
        25%      { border-radius: 45% 55% 55% 45% / 55% 45% 50% 50%; }
        50%      { border-radius: 60% 40% 40% 60% / 50% 50% 60% 40%; }
        75%      { border-radius: 50% 50% 45% 55% / 45% 55% 40% 60%; }
      }

      @keyframes drift1 {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(120px, 60px) scale(1.15); }
        50%  { transform: translate(220px, 140px) scale(0.9); }
        75%  { transform: translate(80px, 200px) scale(1.1); }
        100% { transform: translate(180px, 50px) scale(0.95); }
      }
      @keyframes drift2 {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(-100px, 80px) scale(1.1); }
        50%  { transform: translate(-180px, 40px) scale(0.88); }
        75%  { transform: translate(-60px, 160px) scale(1.2); }
        100% { transform: translate(-140px, 100px) scale(0.92); }
      }
      @keyframes drift3 {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(100px, -110px) scale(1.2); }
        50%  { transform: translate(180px, -50px) scale(0.85); }
        75%  { transform: translate(50px, -150px) scale(1.12); }
        100% { transform: translate(140px, -80px) scale(0.92); }
      }
      @keyframes drift4 {
        0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
        33%  { transform: translate(-130px, -60px) scale(1.2) rotate(30deg); }
        66%  { transform: translate(-60px, 90px) scale(0.8) rotate(-20deg); }
        100% { transform: translate(-150px, 20px) scale(1.1) rotate(12deg); }
      }
      @keyframes drift5 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(-150px, -90px) scale(1.2); }
        66%  { transform: translate(-90px, -170px) scale(0.88); }
        100% { transform: translate(-200px, -40px) scale(1.05); }
      }
      @keyframes drift6 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(140px, -50px) scale(1.15); }
        66%  { transform: translate(90px, -120px) scale(0.9); }
        100% { transform: translate(180px, -90px) scale(1.08); }
      }

      .nav-actions img {
        filter: brightness(0) invert(1);
      }

      /* 去掉封面圆角外的透明/晕边：圆角只放在容器上，图片略放大裁切 */
      .cover-frame {
        overflow: hidden;
        border-radius: 5.15px;
        isolation: isolate;
        backface-visibility: hidden;
      }
      .cover-frame > img,
      .expand-cover > img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transform: scale(1.08);
        transform-origin: center center;
      }

      .cover-stack-trigger {
        cursor: pointer;
        pointer-events: auto;
      }
      .cover-stack-trigger:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.6);
        outline-offset: 4px;
        border-radius: 8px;
      }

      .ui-fade-out {
        transition: opacity 0.45s ease;
      }
      .screen.is-expanded .ui-fade-out {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      .screen.is-collapsing.is-expanded .ui-fade-out {
        opacity: 1;
        pointer-events: none;
        transition: opacity 0.45s ease 0.28s;
      }
      .hero-area {
        transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .screen.is-expanded .hero-area {
        height: 812px;
        z-index: 1;
        pointer-events: none;
      }
      .screen.is-expanded .hero-area .hero-fade {
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      .screen.is-expanded #cover-stack {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
      }
      .screen.is-expanded.is-collapsing .hero-area {
        height: 355px;
      }
      .screen.is-expanded.is-collapsing .hero-area .hero-fade {
        opacity: 1;
        transition: opacity 0.45s ease 0.2s;
      }
      .screen.is-collapsing.is-expanded #cover-stack {
        opacity: 0;
        visibility: hidden;
      }
      .screen.is-expanded .top-chrome {
        z-index: 30;
      }

      /* 展开态：透明层，背景沿用 hero 流体色块 */
      .expanded-layer {
        position: absolute;
        inset: 0;
        z-index: 20;
        background: transparent;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .expand-scroll-viewport {
        position: absolute;
        inset: 0;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        scrollbar-width: none;
      }
      .expand-scroll-viewport::-webkit-scrollbar {
        display: none;
      }
      .screen.is-expanded .expand-scroll-viewport {
        touch-action: pan-y;
      }
      .expand-scroll-content {
        position: relative;
        width: 375px;
        min-height: 812px;
        height: 1540px;
      }
      .expand-top-blur {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 25;
        width: 375px;
        height: 120px;
        pointer-events: none;
        opacity: 0;
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.26) 0%,
          rgba(0, 0, 0, 0) 100%
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          #000 0%,
          rgba(0, 0, 0, 0.6) 55%,
          transparent 100%
        );
        mask-image: linear-gradient(
          to bottom,
          #000 0%,
          rgba(0, 0, 0, 0.6) 55%,
          transparent 100%
        );
        transition: opacity 0.35s ease, backdrop-filter 0.35s ease, -webkit-backdrop-filter 0.35s ease;
      }
      .screen.is-expanded .expanded-layer {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      .screen.is-collapsing.is-expanded .expanded-layer {
        pointer-events: none;
      }

      .expanded-close {
        position: absolute;
        top: 65px;
        right: 16px;
        z-index: 50;
        width: 32px;
        height: 32px;
        padding: 0;
        border: none;
        border-radius: 50%;
        background: #EAB67C;
        color: #D77A0F;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      .expanded-close svg {
        display: block;
        width: 14px;
        height: 14px;
      }
      .expanded-podcast-btn {
        position: absolute;
        top: 65px;
        right: 56px;
        z-index: 50;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 32px;
        padding: 0 12px 0 10px;
        border: none;
        border-radius: 999px;
        background: #EAB67C;
        color: #D77A0F;
        font-family: 'joox', sans-serif;
        font-weight: 700;
        font-size: 14px;
        line-height: 1;
        white-space: nowrap;
        cursor: pointer;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      .expanded-podcast-btn svg {
        display: block;
        flex-shrink: 0;
        width: 16px;
        height: 16px;
      }
      .nav-back {
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      .screen.is-expanded .expanded-close,
      .screen.is-expanded .expanded-podcast-btn {
        opacity: 0.8;
        visibility: visible;
        pointer-events: auto;
      }
      .screen.is-expanded .nav-back {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .screen.is-collapsing.is-expanded .expanded-close,
      .screen.is-collapsing.is-expanded .expanded-podcast-btn {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      .screen.is-expanded .nav-actions {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }
      .screen.is-collapsing.is-expanded .nav-actions {
        opacity: 1;
        transition: opacity 0.4s ease 0.3s;
      }

      .expand-cover {
        position: absolute;
        left: 0;
        top: 0;
        width: 144px;
        height: 144px;
        transform-origin: center center;
        border-radius: 5px;
        overflow: hidden;
        transition: transform 0.85s cubic-bezier(0.33, 1.02, 0.54, 1);
        transition-delay: calc(var(--i) * 0.08s);
        will-change: transform;
      }
      .expand-cover-inner {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        overflow: hidden;
      }
      .screen.is-expanded .expand-cover:not(.expand-cover-extra).is-settled .expand-cover-inner,
      .screen.is-expanded .expand-cover-extra.is-settled.is-extra-visible .expand-cover-inner {
        animation: expand-cover-float 4.2s ease-in-out infinite;
        animation-delay: calc(var(--i) * 0.35s);
      }
      .expand-cover-extra {
        opacity: 0;
        transition: opacity 0.55s ease !important;
        transition-delay: calc(var(--i) * 0.1s) !important;
      }
      .expand-cover-extra.is-extra-visible {
        opacity: 1;
      }
      @keyframes expand-cover-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .expand-cover img {
        pointer-events: none;
      }

      #expand-texts {
        position: absolute;
        left: 187px;
        top: 169px;
        width: 172px;
        display: flex;
        flex-direction: column;
        gap: 85px;
        pointer-events: none;
      }
      .screen.is-expanded #expand-texts {
        pointer-events: auto;
      }

      .expand-song-text {
        position: relative;
        width: 100%;
        flex-shrink: 0;
        opacity: 0;
        transform: translateX(12px);
        transition: opacity 0.55s ease, transform 0.55s ease;
        transition-delay: calc(0.32s + var(--i) * 0.1s);
        pointer-events: none;
      }
      .screen.is-expanded .expand-song-text:not(.expand-song-text-extra),
      .screen.is-expanded .expand-song-text-extra.is-extra-visible {
        pointer-events: auto;
        cursor: pointer;
      }
      .screen.is-expanded .expand-cover {
        pointer-events: auto;
        cursor: pointer;
      }
      .screen.is-expanded .expand-song-text:not(.expand-song-text-extra) {
        opacity: 1;
        transform: translateX(0);
      }
      .expand-song-text-extra {
        opacity: 0;
        transform: translateX(10px);
        transition: opacity 0.55s ease, transform 0.55s ease;
        transition-delay: calc(var(--i) * 0.1s);
      }
      .expand-song-text-extra.is-extra-visible {
        opacity: 1;
        transform: translateX(0);
      }
      .screen.is-collapsing.is-expanded .expand-song-text:not(.expand-song-text-extra) {
        opacity: 0;
        transform: translateX(10px);
        transition-delay: calc(var(--i) * 0.05s);
      }
      .screen.is-collapsing.is-expanded .expand-song-text-extra {
        opacity: 0;
        transform: translateX(10px);
        transition-delay: 0ms;
      }
      /* 第一首歌名 + 播放 icon：在 #expand-texts 首项内，歌名右侧 8px */
      .expand-title-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        min-height: 21px;
      }
      .expand-title-row .expand-title {
        margin: 0;
        flex: 0 1 auto;
        min-width: 0;
      }
      .expand-now-playing {
        display: none;
        flex: 0 0 auto;
        align-items: flex-end;
        justify-content: space-between;
        width: 14px;
        height: 14px;
        gap: 2px;
      }
      .expand-song-text.is-playing .expand-now-playing {
        display: inline-flex;
      }
      .expand-eq-bar {
        display: block;
        width: 2px;
        border-radius: 1px;
        background: #fff;
        transform-origin: center bottom;
        will-change: transform;
      }
      .expand-eq-bar:nth-child(1) {
        height: 7px;
        animation: expand-eq-1 0.85s ease-in-out infinite;
      }
      .expand-eq-bar:nth-child(2) {
        height: 14px;
        animation: expand-eq-2 0.72s ease-in-out infinite;
      }
      .expand-eq-bar:nth-child(3) {
        height: 10px;
        animation: expand-eq-3 0.95s ease-in-out infinite;
      }
      .expand-eq-bar:nth-child(4) {
        height: 5px;
        animation: expand-eq-4 0.8s ease-in-out infinite;
      }
      @keyframes expand-eq-1 {
        0%, 100% { transform: scaleY(0.55); }
        50% { transform: scaleY(1); }
      }
      @keyframes expand-eq-2 {
        0%, 100% { transform: scaleY(0.45); }
        50% { transform: scaleY(1); }
      }
      @keyframes expand-eq-3 {
        0%, 100% { transform: scaleY(0.5); }
        50% { transform: scaleY(1); }
      }
      @keyframes expand-eq-4 {
        0%, 100% { transform: scaleY(0.4); }
        50% { transform: scaleY(1); }
      }

            'touchstart',
            function (e) {
              moved = false;
              touchHandled = false;
              var t = e.changedTouches[0];
              startX = t.clientX;
              startY = t.clientY;

            { passive: true }

        function songAudioCandidates(song) {
          if (song.audio) return [song.audio];
          if (!song.audioBase) return [];

            './assets/audio/' + song.audioBase + '.mp3',
            './assets/audio/' + song.audioBase + '.m4a',

        function stopPlaylistAudio() {
          if (!playlistAudio) return;
          playlistAudio.pause();
          playlistAudio.removeAttribute('src');
          playlistAudio.load();
          stopBlobRhythm();
        }

        var blobRhythm = (function () {
          var audioCtx = null;
          var analyser = null;
          var sourceNode = null;
          var freqData = null;
          var rafId = 0;
          var blobs = [];
          var beatPulse = 0;
          var bassAvg = 0;
          var lastBeatAt = 0;
          var visibleCount = 6;
          var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

          var BLOB_PHASES = [
            { phase: 0, speedMul: 1.0, orbitRx: 1.05, orbitRy: 1.35, ax: 55, ay: 210 },
            { phase: 1.6, speedMul: 0.9, orbitRx: 1.1, orbitRy: 1.4, ax: 360, ay: 260 },
            { phase: 3.1, speedMul: 0.95, orbitRx: 1.0, orbitRy: 1.45, ax: 90, ay: -400 },
            { phase: 4.5, speedMul: 1.05, orbitRx: 1.08, orbitRy: 1.3, ax: 130, ay: 320 },
            { phase: 2.2, speedMul: 0.88, orbitRx: 1.12, orbitRy: 1.25, ax: 70, ay: 180 },
            { phase: 5.8, speedMul: 1.1, orbitRx: 1.06, orbitRy: 1.38, ax: 310, ay: 120 },
          ];

          function ensureAudioGraph() {
            if (!playlistAudio || audioCtx) return;
            var Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;
            audioCtx = new Ctx();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.82;
            freqData = new Uint8Array(analyser.frequencyBinCount);
            sourceNode = audioCtx.createMediaElementSource(playlistAudio);
            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);
          }

          function readBands() {
            analyser.getByteFrequencyData(freqData);
            var len = freqData.length;
            var bass = 0;
            var mid = 0;
            var high = 0;
            var bassEnd = Math.max(4, Math.floor(len * 0.08));
            var midEnd = Math.max(bassEnd + 1, Math.floor(len * 0.35));
            var i;
            for (i = 0; i < bassEnd; i++) bass += freqData[i];
            for (i = bassEnd; i < midEnd; i++) mid += freqData[i];
            for (i = midEnd; i < len; i++) high += freqData[i];
            bass /= bassEnd;
            mid /= midEnd - bassEnd;
            high /= len - midEnd;
            return { bass: bass / 255, mid: mid / 255, high: high / 255 };
          }

          function detectBeat(bass) {
            bassAvg = bassAvg * 0.96 + bass * 0.04;
            var now = performance.now();
            if (bass > bassAvg * 1.3 + 0.08 && now - lastBeatAt > 360) {
              lastBeatAt = now;
              beatPulse = 0.4;
            }
            beatPulse *= 0.72;
            if (beatPulse < 0.03) beatPulse = 0;
          }

          function targetBlobCount(energy) {
            if (energy < 0.24) return 4;
            if (energy < 0.42) return 5;
            if (energy < 0.62) return 6;
            return 7;
          }

          function rhythmBlobOpacity(blob) {
            // 亮色云团：播放时整体透明度更低，减少“闪/跳”的观感
            if (blob.classList.contains('blob-3')) return '0.48';
            if (blob.classList.contains('blob-5')) return '0.54';
            if (blob.classList.contains('blob-7')) return '0.62';
            if (blob.classList.contains('blob-8')) return '0.56';
            if (blob.classList.contains('blob-9')) return '0.52';
            return '0.6';
          }

          function updateVisibility(count) {
            if (count === visibleCount) return;
            visibleCount = count;
            blobs.forEach(function (blob, i) {
              var show = i < count;
              blob.classList.toggle('is-rhythm-visible', show);
              blob.style.opacity = show ? rhythmBlobOpacity(blob) : '0';
            });
          }

          function tick() {
            rafId = 0;
            if (!expanded || !fluidBg || !analyser || !playlistAudio || playlistAudio.paused) {
              stop();
              return;
            }

            if (audioCtx && audioCtx.state === 'suspended') {
              audioCtx.resume();
            }

            var bands = readBands();
            var energy = bands.bass * 0.55 + bands.mid * 0.3 + bands.high * 0.15;
            detectBeat(bands.bass);

            // 亮色云团：位移幅度与脉冲幅度下调
            var rhythm = Math.min(1, energy * 0.95 + beatPulse * 0.12);
            var speed = 0.06 + rhythm * 0.14 + beatPulse * 0.02;
            var amp = 55 + rhythm * 70 + beatPulse * 25;
            var t = performance.now() / 1000;
            // 可见云团数量也更克制，避免“闪动感”由层切换造成
            var count = targetBlobCount(energy + beatPulse * 0.05);

            updateVisibility(count);

            blobs.forEach(function (blob, i) {
              if (i >= count) {
                blob.style.opacity = '0';
                return;
              }
              blob.style.opacity = rhythmBlobOpacity(blob);
              var cfg = BLOB_PHASES[i] || BLOB_PHASES[0];
              var layerSpeed = speed * cfg.speedMul;
              var rx = amp * cfg.orbitRx;
              var ry = amp * cfg.orbitRy;
              var ox = cfg.ax || 0;
              var oy = cfg.ay || 0;
              var x =
                ox +
                Math.sin(t * layerSpeed + cfg.phase) * rx +
                Math.cos(t * layerSpeed * 0.62 + cfg.phase * 1.4) * rx * 0.55;
              var y =
                oy +
                Math.cos(t * layerSpeed * 0.78 + cfg.phase * 1.2) * ry +
                Math.sin(t * layerSpeed * 0.48 + cfg.phase * 0.8) * ry * 0.65;
              var scale = 1 + rhythm * 0.05 + beatPulse * 0.02;
              var rot = Math.sin(t * layerSpeed * 0.35 + cfg.phase) * (3 + rhythm * 3);
              blob.style.transform =
                'translate(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px) scale(' + scale.toFixed(3) + ') rotate(' + rot.toFixed(1) + 'deg)';
            });

            rafId = requestAnimationFrame(tick);
          }

          function start() {
            if (reducedMotion || !fluidBg || !expanded) return;
            ensureAudioGraph();
            if (!analyser) return;
            if (audioCtx && audioCtx.state === 'suspended') {
              audioCtx.resume();

            if (!blobs.length) {

              );
            }

            if (!rafId) rafId = requestAnimationFrame(tick);
          }

          function stop() {
            if (rafId) {
              cancelAnimationFrame(rafId);
              rafId = 0;
            }
            if (!fluidBg) return;
            fluidBg.classList.remove('is-rhythm-active');
            visibleCount = 6;
            blobs.forEach(function (blob) {
              blob.classList.remove('is-rhythm-visible');
              blob.style.transform = '';
              blob.style.opacity = '';
            });
            beatPulse = 0;
            bassAvg = 0;
          }

          if (playlistAudio) {
            playlistAudio.addEventListener('play', start);
            playlistAudio.addEventListener('pause', stop);
            playlistAudio.addEventListener('ended', stop);
          }

          return { start: start, stop: stop };
        })();

        function stopBlobRhythm() {
          blobRhythm.stop();
        }

        function startBlobRhythm() {
          blobRhythm.start();
        }

        function tryPlayAudioSource(src, onFail) {
          if (!playlistAudio) return;
          playlistAudio.addEventListener(
            'error',
            function onErr() {
              playlistAudio.removeEventListener('error', onErr);
              onFail();
            }
          );
          playlistAudio.src = src;
          playlistAudio.load();
          var p = playlistAudio.play();
          if (p && typeof p.then === 'function') {
            p.catch(function () {
              onFail();
            });
          }
        }

        function clearNowPlaying() {
          if (!expandTexts) return;
          expandTexts.querySelectorAll('.expand-song-text').forEach(function (textEl) {
            textEl.classList.remove('is-playing');

        function playSongAtIndex(index) {
          if (index < 0 || index >= SONGS.length) return;
          var song = SONGS[index];
          var hasAudio = !!(song.audio || song.audioBase);

          if (playlistAudio && nowPlayingIndex === index && playlistAudio.src) {
            if (!playlistAudio.paused) {
              playlistAudio.pause();
              clearNowPlaying();
              stopBlobRhythm();
              return;
            }
            setNowPlaying(index);
            playlistAudio.play().catch(function () {});
            startBlobRhythm();
            return;
          }

          setNowPlaying(index);
          if (!playlistAudio || !hasAudio) return;

          var candidates = songAudioCandidates(song);
          var attempt = 0;

          function tryNext() {
            if (attempt >= candidates.length) return;
            var src = candidates[attempt++];
            tryPlayAudioSource(src, tryNext);
          }

          tryNext();
          playlistAudio.addEventListener(
            'playing',
            function onPlaying() {
              playlistAudio.removeEventListener('playing', onPlaying);
              startBlobRhythm();
            }
          );
        }

        function bindExpandSongInteractions() {

        function buildExpandDOM() {
          expandCovers.innerHTML = '';
          expandTexts.innerHTML = '';
          SONGS.forEach(function (song, i) {
            var isExtra = i >= EXPAND_STACK_COUNT;

        function getStackCovers() {
          var list = [];
          expandCovers.querySelectorAll('.expand-cover').forEach(function (el) {
            if (parseInt(el.dataset.songIndex, 10) < EXPAND_STACK_COUNT) list.push(el);

        function hideExtraItems() {
          expandCovers.querySelectorAll('.expand-cover-extra').forEach(function (el) {
            el.classList.remove('is-extra-visible', 'is-settled');
          });
          expandTexts.querySelectorAll('.expand-song-text-extra').forEach(function (el) {
            el.classList.remove('is-extra-visible');
          });

        function animateExtrasFadeIn() {
          var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          var extraCovers = expandCovers.querySelectorAll('.expand-cover-extra');
          var extraTexts = expandTexts.querySelectorAll('.expand-song-text-extra');

          extraCovers.forEach(function (coverEl, i) {
            var reveal = function () {
              coverEl.classList.add('is-extra-visible', 'is-settled');
              if (extraTexts[i]) extraTexts[i].classList.add('is-extra-visible');
              if (i === extraCovers.length - 1) updateExpandScrollFx();
            };
            if (reducedMotion) {
              reveal();
              return;
            }
            window.setTimeout(reveal, i * EXTRA_STAGGER_MS);

        function getStackRect(index) {
          var key = index === null ? '0' : String(index);
          var img = document.querySelector('.stack-cover[data-stack-index="' + key + '"]');
          var frame = img && img.closest('.cover-frame');
          var el = frame || img;
          return el ? el.getBoundingClientRect() : null;
        }

        function stackTransform(song, screenRect, half) {
          var from = getStackRect(song.stackIndex);
          if (!from) {
            from = {
              left: screenRect.left + screenRect.width / 2 - half,
              top: screenRect.top + 200,
              width: COVER_SIZE,
              height: COVER_SIZE,
            };
          }
          return {
            x: from.left + from.width / 2 - screenRect.left - half,
            y: from.top + from.height / 2 - screenRect.top - half,
            scale: Math.max(from.width / COVER_SIZE, from.height / COVER_SIZE),
          };
        }

        function coverTransform(song, parallaxY) {
          var y = song.ty - (parallaxY || 0);
          return 'translate(' + song.tx + 'px,' + y + 'px) rotate(' + song.rot + 'deg)';
        }

        function markStackCoversSettled() {
          getStackCovers().forEach(function (coverEl) {
            coverEl.classList.add('is-settled');
          });
        }

        function updateExpandScrollFx() {
          if (!expandScrollViewport || !expanded) return;
          var scrollTop = expandScrollViewport.scrollTop;
          var blurAmount = Math.min(12, scrollTop * 0.05);
          var blurOpacity = Math.min(0.45, scrollTop / 160);

          if (expandTopBlur) {
            expandTopBlur.style.opacity = String(blurOpacity);
            expandTopBlur.style.backdropFilter = 'blur(' + blurAmount + 'px)';
            expandTopBlur.style.webkitBackdropFilter = 'blur(' + blurAmount + 'px)';
          }

          expandCovers.querySelectorAll('.expand-cover').forEach(function (coverEl, i) {
            var song = SONGS[i];
            var depth = 0.06 + (i % 3) * 0.02;
            var parallaxY = scrollTop * depth;
            if (coverEl.classList.contains('is-settled')) {
              coverEl.style.transition = 'none';
            }
            coverEl.style.transform = coverTransform(song, parallaxY);
          });
        }

        function onExpandScroll() {
          if (expandScrollRaf) return;
          expandScrollRaf = requestAnimationFrame(function () {
            expandScrollRaf = 0;
            updateExpandScrollFx();
          });
        }

        function bindExpandScroll() {
          if (!expandScrollViewport) return;
          expandScrollViewport.addEventListener('scroll', onExpandScroll, { passive: true });
        }

        function resetExpandScroll() {
          if (expandScrollViewport) expandScrollViewport.scrollTop = 0;
          if (expandTopBlur) {
            expandTopBlur.style.opacity = '0';
            expandTopBlur.style.backdropFilter = 'blur(0px)';
            expandTopBlur.style.webkitBackdropFilter = 'blur(0px)';
          }
          hideExtraItems();
          getStackCovers().forEach(function (coverEl) {
            coverEl.classList.remove('is-settled');
          });
        }

        function animateCoversExpand() {
          var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          var screenRect = screen.getBoundingClientRect();
          var stackCovers = getStackCovers();
          var half = COVER_SIZE / 2;
          var lastStackIndex = EXPAND_STACK_COUNT - 1;
          var expandDone = false;

          function finishStackExpand() {
            if (expandDone) return;
            expandDone = true;
            markStackCoversSettled();
            updateExpandScrollFx();
            animateExtrasFadeIn();
          }

          stackCovers.forEach(function (coverEl) {
            var i = parseInt(coverEl.dataset.songIndex, 10);
            var song = SONGS[i];
            var stack = stackTransform(song, screenRect, half);

            coverEl.style.transition = reducedMotion ? 'none' : COVER_TRANSITION_EXPAND;
            coverEl.style.transitionDelay = reducedMotion ? '0ms' : i * STAGGER_MS + 'ms';

            if (reducedMotion) {
              coverEl.style.transform = coverTransform(song, 0);
              return;
            }

            coverEl.style.transform =
              'translate(' + stack.x + 'px,' + stack.y + 'px) scale(' + stack.scale + ') rotate(0deg)';

            function onExpandEnd(e) {
              if (e.propertyName !== 'transform') return;
              coverEl.removeEventListener('transitionend', onExpandEnd);
              if (i === lastStackIndex) finishStackExpand();
            }
            coverEl.addEventListener('transitionend', onExpandEnd);

            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                coverEl.style.transform = coverTransform(song, 0);
              });
            });
          });

          if (reducedMotion) {
            finishStackExpand();
            return;
          }
          window.setTimeout(finishStackExpand, COVER_MS + lastStackIndex * STAGGER_MS + 200);
        }

        function animateCoversCollapse(done) {
          var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          hideExtraItems();

          if (reducedMotion) {
            done();
            return;
          }

          var screenRect = screen.getBoundingClientRect();
          var stackCovers = getStackCovers();
          var half = COVER_SIZE / 2;
          var n = EXPAND_STACK_COUNT;
          var pending = stackCovers.length;
          var coversFinished = false;

          function coversComplete() {
            if (coversFinished) return;
            coversFinished = true;
            done();
          }

          function coverDone() {
            pending -= 1;
            if (pending === 0) coversComplete();
          }

          stackCovers.forEach(function (coverEl) {
            var i = parseInt(coverEl.dataset.songIndex, 10);
            var song = SONGS[i];
            var stack = stackTransform(song, screenRect, half);
            var reverseDelay = (n - 1 - i) * STAGGER_MS;

            coverEl.classList.remove('is-settled');
            coverEl.style.transition = COVER_TRANSITION_COLLAPSE;
            coverEl.style.transitionDelay = reverseDelay + 'ms';

            function onEnd(e) {
              if (e.propertyName !== 'transform') return;
              coverEl.removeEventListener('transitionend', onEnd);
              coverDone();
            }
            coverEl.addEventListener('transitionend', onEnd);

            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                coverEl.style.transform =
                  'translate(' + stack.x + 'px,' + stack.y + 'px) scale(' + stack.scale + ') rotate(0deg)';
              });
            });
          });

          setTimeout(coversComplete, COVER_MS + (n - 1) * STAGGER_MS + 120);
        }

        function finishCollapse() {
          stopBlobRhythm();
          stopPlaylistAudio();
          coverStack.style.transition = 'none';
          screen.classList.remove('is-expanded', 'is-collapsing');
          expandedLayer.setAttribute('aria-hidden', 'true');
          expandedClose.setAttribute('aria-hidden', 'true');
          if (expandedPodcastBtn) expandedPodcastBtn.setAttribute('aria-hidden', 'true');
          resetExpandScroll();
          expandCovers.innerHTML = '';
          expandTexts.innerHTML = '';
          coverStack.offsetHeight;
          resetCollapseStyles();
          expanded = false;
          collapsing = false;
          expandedClose.disabled = false;
          if (expandedPodcastBtn) expandedPodcastBtn.disabled = false;
          coverStack.style.pointerEvents = '';
        }

        function resetCollapseStyles() {
          var heroArea = document.querySelector('.hero-area');
          coverStack.style.transition = '';
          coverStack.style.opacity = '';
          coverStack.style.visibility = '';
          coverStack.style.pointerEvents = '';
          if (heroArea) heroArea.style.transition = '';
        }

        function startHeroCollapse() {
          var heroArea = document.querySelector('.hero-area');
          if (!heroArea) return;
          var collapseDuration = COVER_MS + (EXPAND_STACK_COUNT - 1) * STAGGER_MS;
          heroArea.style.transition =
            'height ' + collapseDuration + 'ms cubic-bezier(0.4, 0, 0.2, 1)';
        }

        function expandPlaylist() {
          if (expanded || collapsing) return;
          expanded = true;
          buildExpandDOM();
          bindExpandSongInteractions();
          playSongAtIndex(0);
          resetExpandScroll();
          expandedLayer.setAttribute('aria-hidden', 'false');
          expandedClose.setAttribute('aria-hidden', 'false');
          if (expandedPodcastBtn) expandedPodcastBtn.setAttribute('aria-hidden', 'false');
          screen.classList.add('is-expanded');
          animateCoversExpand();
        }

        bindExpandScroll();

        function collapsePlaylist() {
          if (!expanded || collapsing) return;
          collapsing = true;
          expandedClose.disabled = true;
          if (expandedPodcastBtn) expandedPodcastBtn.disabled = true;
          coverStack.style.pointerEvents = 'none';

          if (expandScrollViewport) expandScrollViewport.scrollTop = 0;
          if (expandTopBlur) {
            expandTopBlur.style.opacity = '0';
            expandTopBlur.style.backdropFilter = 'blur(0px)';
            expandTopBlur.style.webkitBackdropFilter = 'blur(0px)';
          }
          hideExtraItems();
          getStackCovers().forEach(function (coverEl) {
            var i = parseInt(coverEl.dataset.songIndex, 10);
            coverEl.classList.remove('is-settled');
            coverEl.style.transition = 'none';
            coverEl.style.transform = coverTransform(SONGS[i], 0);
          });

          startHeroCollapse();
          screen.classList.add('is-collapsing');

          requestAnimationFrame(function () {
            animateCoversCollapse(finishCollapse);
          });
        }

        bindTap(coverStack, function () {
          expandPlaylist();
        });
        coverStack.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            expandPlaylist();
          }
        });
        bindTap(expandedClose, function (e) {
          if (e) {
            e.preventDefault();
            e.stopPropagation();
          }
          collapsePlaylist();
        });

        if (mainPlayBtn) {
          bindTap(mainPlayBtn, function () {
            playSongAtIndex(nowPlayingIndex);
          });
          mainPlayBtn.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              playSongAtIndex(nowPlayingIndex);
            }
          });
        }

        if (randomBtn) {
          bindTap(randomBtn, function () {
            expandPlaylist();
          });
          randomBtn.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              expandPlaylist();
            }
          });
        }
      })();
    </script>
  </body>
</html>
